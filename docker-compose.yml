# Shared bind-mounts for E2E services — source is read-only so
# code changes don't require an image rebuild.
# The anonymous /app/node_modules volume keeps the image's deps
# isolated, preventing root-owned files from leaking to the host.
x-e2e-volumes: &e2e-volumes
  - ./src:/app/src:ro
  - ./e2e:/app/e2e:ro
  - ./public:/app/public:ro
  - ./index.html:/app/index.html:ro
  - ./playwright.config.ts:/app/playwright.config.ts:ro
  - ./vite.config.ts:/app/vite.config.ts:ro
  - ./tsconfig.json:/app/tsconfig.json:ro
  - ./tsconfig.app.json:/app/tsconfig.app.json:ro
  - ./tsconfig.node.json:/app/tsconfig.node.json:ro
  - ./tailwind.config.js:/app/tailwind.config.js:ro
  - ./postcss.config.js:/app/postcss.config.js:ro
  - /app/node_modules

services:
  # ── App (default profile) ────────────────────────────────
  # Multi-stage build → nginx serving static assets (~25 MB).
  app:
    build:
      context: .
      target: production
    ports:
      - "4173:80"

  # ── Unit / coverage (vitest) ─────────────────────────────
  # Targets the "dev" stage which has source + all devDeps.
  coverage:
    build:
      context: .
      target: dev
    profiles: [tests]
    command: ["pnpm", "vitest", "run", "--coverage"]

  # ── E2E – Chromium only (fast, good for CI) ─────────────
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    profiles: [tests]
    ipc: host
    environment:
      - CI=true
    volumes: *e2e-volumes

  # ── E2E – all browsers (chromium + firefox + webkit + mobile) ──
  # All browsers are pre-installed in the Playwright base image,
  # so no runtime install is needed — just override the command.
  e2e-all:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    profiles: [tests]
    ipc: host
    environment:
      - CI=true
    volumes: *e2e-volumes
    command: ["pnpm", "test:e2e"]
